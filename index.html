<title>Purva Organics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e293b,#334155)}
.login-box{background:#fff;border-radius:12px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:22px;margin-bottom:4px;color:#1e293b}
.login-box p{color:#64748b;font-size:14px;margin-bottom:24px}
.login-box label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#334155}
.login-box select,.login-box input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:16px;outline:none}
.login-box select:focus,.login-box input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.login-box button.main-btn{width:100%;padding:12px;background:#1a56db;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-box button.main-btn:hover{background:#1e40af}
.login-err{color:#dc2626;font-size:13px;margin-bottom:12px;display:none}
.sidebar{width:220px;background:#1e293b;color:#cbd5e1;padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10;overflow-y:auto}
.sidebar .logo{padding:0 20px 20px;border-bottom:1px solid #334155;margin-bottom:8px}
.sidebar .logo h2{color:#fff;font-size:17px}
.sidebar .logo span{font-size:12px;color:#94a3b8}
.sidebar nav{flex:1;display:flex;flex-direction:column}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#cbd5e1;text-decoration:none;font-size:14px;cursor:pointer;transition:all .15s}
.sidebar nav a:hover{background:#334155;color:#fff}
.sidebar nav a.active{background:#3b82f6;color:#fff;font-weight:600}
.sidebar .user-info{padding:16px 20px;border-top:1px solid #334155;font-size:12px}
.sidebar .user-info .role{color:#3b82f6;font-weight:600;text-transform:uppercase;font-size:11px}
.main{margin-left:220px;flex:1;padding:24px;min-height:100vh}
.page-hdr{margin-bottom:24px}.page-hdr h1{font-size:22px;font-weight:700}.page-hdr p{color:#555;font-size:14px;margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.sc{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sc .lb{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.5px;font-weight:600}.sc .vl{font-size:26px;font-weight:700;margin-top:4px}.sc .sb{font-size:12px;color:#555;margin-top:2px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px;overflow:hidden}
.card-hd{padding:16px 20px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.card-hd h3{font-size:15px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:12px;text-transform:uppercase;color:#555;font-weight:700;letter-spacing:.3px;border-bottom:1px solid #ddd}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f1f5f9}tr:hover td{background:#f8fafc}
.btn{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:#1a56db;color:#fff}.btn-p:hover{background:#1e40af}
.btn-s{background:#16a34a;color:#fff}.btn-d{background:#dc2626;color:#fff}.btn-o{background:#fff;color:#111;border:1px solid #ddd}
.btn-sm{padding:5px 10px;font-size:12px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:20px}
.fi{display:flex;flex-direction:column;gap:4px}.fi.full{grid-column:1/-1}
.fi label{font-size:12px;font-weight:600;color:#555}
.fi input,.fi select,.fi textarea{padding:9px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;width:100%;box-sizing:border-box}
.fi input:focus,.fi select:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.08)}
.fa{padding:0 20px 20px;display:flex;gap:10px;justify-content:flex-end}
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}
.bg-gr{background:#dcfce7;color:#166534}.bg-rd{background:#fee2e2;color:#991b1b}.bg-bl{background:#dbeafe;color:#1e40af}.bg-yl{background:#fef9c3;color:#854d0e}.bg-or{background:#ffedd5;color:#9a3412}
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{padding:20px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.modal-hd h3{font-size:16px;font-weight:700}
.modal-cl{background:none;border:none;font-size:20px;cursor:pointer;color:#555}
.empty{padding:40px;text-align:center;color:#555;font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:200;animation:si .3s ease}
@keyframes si{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.lang-sw{display:flex;gap:4px;padding:10px 20px}
.lang-sw button{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #475569;background:transparent;color:#94a3b8}
.lang-sw button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.tabs{display:flex;gap:0;border-bottom:2px solid #ddd;margin-bottom:20px}
.tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:#555;text-decoration:none}
.tab.active{color:#1a56db;border-bottom-color:#1a56db}
.progress-bar{height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:16px}.fg{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
@media print{.sidebar,.page-hdr .btn,.no-print,.toast{display:none!important}.main{margin:0;padding:0}.card{box-shadow:none}}
</style>

function toast(m){S.toastMsg=m;R();clearTimeout(S.toastTimer);S.toastTimer=setTimeout(()=>{S.toastMsg=null;R()},2500);}
function getWAC(c){let tc=0,tq=0;S.purchases.filter(p=>p.chemical===c).forEach(p=>{tc+=p.qty*p.pricePerKg;tq+=p.qty;});return tq>0?tc/tq:0;}
function getInv(){const c={};S.purchases.forEach(p=>{if(!c[p.chemical])c[p.chemical]={qty:0,tc:0};c[p.chemical].qty+=(p.qty||0);c[p.chemical].tc+=(p.qty||0)*(p.pricePerKg||0);});S.sales.forEach(s=>{if(c[s.chemical])c[s.chemical].qty-=(s.qty||0);});return c;}
function uniq(a,k){return[...new Set(a.map(x=>x[k]).filter(Boolean))];}
function setLang(l){S.lang=l;R();}

// Customer totals: total owed by each customer, total paid
function getCustBalances(){
  const b={};
  S.sales.forEach(s=>{if(!b[s.customer])b[s.customer]={total:0,paid:0};b[s.customer].total+=s.qty*s.pricePerKg;});
  // Add GST to totals
  S.sales.forEach(s=>{if(b[s.customer]){const gstRate=s.gstRate||18;const gstAmt=(s.qty*s.pricePerKg)*gstRate/100;b[s.customer].total+=gstAmt;}});
  S.paymentLogs.filter(p=>p.type==="customer_in").forEach(p=>{if(b[p.party])b[p.party].paid+=p.amount;});
  return b;
}
// Vendor totals: total owed to each vendor, total paid
function getVendorBalances(){
  const b={};
  S.purchases.forEach(p=>{if(!b[p.vendor])b[p.vendor]={total:0,paid:0};b[p.vendor].total+=p.qty*p.pricePerKg;});
  S.paymentLogs.filter(p=>p.type==="vendor_out").forEach(p=>{if(b[p.party])b[p.party].paid+=p.amount;});
  return b;
}

function listen(){unsubs.forEach(u=>u());unsubs=[];
  unsubs.push(db.collection("purchases").orderBy("createdAt","desc").onSnapshot(s=>{S.purchases=s.docs.map(d=>({id:d.id,...d.data()}));R();}));
  unsubs.push(db.collection("sales").orderBy("createdAt","desc").onSnapshot(s=>{S.sales=s.docs.map(d=>({id:d.id,...d.data()}));R();}));
  unsubs.push(db.collection("paymentLogs").orderBy("createdAt","desc").onSnapshot(s=>{S.paymentLogs=s.docs.map(d=>({id:d.id,...d.data()}));R();}));
  unsubs.push(db.collection("settings").doc("company").onSnapshot(d=>{if(d.exists)S.company={...S.company,...d.data()};R();}));
}

async function saveP(){
  const d={date:$("pD").value,chemical:$("pC").value.trim(),vendor:$("pV").value.trim(),qty:parseFloat($("pQ").value)||0,pricePerKg:parseFloat($("pR").value)||0,notes:$("pN").value.trim(),addedBy:S.role,createdAt:firebase.firestore.FieldValue.serverTimestamp()};

  return `<div class="page-hdr"><h1>${T("invPage")}</h1><p>${T("invSub")}</p></div>
  <div class="no-print" style="margin-bottom:16px"><button class="btn btn-o" onclick="xcsv('inventory')">${T("exportCSV")}</button></div>
  <div class="card"><table><thead><tr><th>${T("chemical")}</th><th>${T("availStock")}</th><th>${T("avgCostKg")}</th><th>${T("stockVal")}</th><th>${T("status")}</th></tr></thead><tbody>
  ${rows.map(([c,d])=>{const avg=d.qty>0?d.tc/d.qty:0;const v=d.qty*avg;const st=d.qty<=0?T("outOfStock"):d.qty<50?T("lowStock"):T("inStock");const bc=d.qty<=0?"bg-rd":d.qty<50?"bg-yl":"bg-gr";
    return`<tr><td><b>${c}</b></td><td>${fq(d.qty)}</td><td>${fmt(avg)}</td><td>${fmt(v)}</td><td><span class="badge ${bc}">${st}</span></td></tr>`;}).join("")}
  ${rows.length===0?`<tr><td colspan="5" class="empty">${T("noInv")}</td></tr>`:""}</tbody></table></div>`;
}

// =====================================================================
// SALES

function salesHTML(){
  return `<div class="page-hdr"><h1>${T("salesPage")}</h1><p>${T("salesSub")}</p></div>
  <div class="no-print" style="margin-bottom:16px;display:flex;gap:10px">
    <button class="btn btn-p" onclick="showSF()">${T("newSale")}</button>
    <button class="btn btn-o" onclick="xcsv('sales')">${T("exportCSV")}</button></div>
  <div class="card"><table><thead><tr><th>${T("date")}</th><th>${T("chemical")}</th><th>${T("customer")}</th><th>${T("qty")}</th><th>${T("sellRate")}</th><th>${T("costRate")}</th><th>${T("marginKg")}</th><th>${T("totalProfit")}</th><th>${T("actions")}</th></tr></thead><tbody>
  ${S.sales.map(s=>{const m=s.pricePerKg-(s.costPerKg||0);const p=m*s.qty;
  return`<tr><td>${s.date}</td><td><b>${s.chemical}</b></td><td>${s.customer}</td><td>${fq(s.qty)}</td><td>${fmt(s.pricePerKg)}</td><td>${fmt(s.costPerKg||0)}</td>
  <td style="color:${m>=0?"#16a34a":"#dc2626"}"><b>${fmt(m)}</b></td><td style="color:${p>=0?"#16a34a":"#dc2626"}"><b>${fmt(p)}</b></td>
  <td><button class="btn btn-p btn-sm" onclick="genInv('${s.id}')">${T("invoice")}</button> <button class="btn btn-d btn-sm" onclick="delS('${s.id}')">${T("delete")}</button></td></tr>`;}).join("")}
  ${S.sales.length===0?`<tr><td colspan="9" class="empty">${T("noSales")}</td></tr>`:""}</tbody></table></div>`;
}
function showSF(){
  const inv=getInv();const chems=Object.entries(inv).filter(([,d])=>d.qty>0);
  const custs=uniq(S.sales,"customer").map(c=>`<option value="${c}">`).join("");
  let ov=document.createElement("div");ov.id="modalOv";ov.className="modal-ov";ov.onclick=function(e){if(e.target===ov){ov.remove();S.modal=null;}};
  ov.innerHTML=`<div class="modal"><div class="modal-hd"><h3>${T("newSaleEntry")}</h3><button class="modal-cl" onclick="document.getElementById('modalOv').remove();S.modal=null;">&times;</button></div>
  <div class="fg">
    <div class="fi"><label>${T("date")}</label><input type="date" id="sD" value="${td()}"></div>
    <div class="fi"><label>${T("chemical")}</label><select id="sC" onchange="updCH()"><option value="">${T("selectChem")}</option>${chems.map(([c,d])=>`<option value="${c}">${c} (${fq(d.qty)} ${T("avail")})</option>`).join("")}</select></div>
    <div class="fi"><label>${T("customer")}</label><input id="sCu" placeholder="${T("custName")}" list="cul"><datalist id="cul">${custs}</datalist></div>
    <div class="fi"><label>${T("qtyKg")}</label><input type="number" id="sQ" placeholder="250"></div>
    <div class="fi"><label>${T("sellingPriceKg")}</label><input type="number" id="sP" placeholder="130" step="0.01"></div>
    <div class="fi"><label>${T("wacKg")}</label><div style="display:flex;gap:6px;align-items:center"><input id="sW" readonly style="background:#f1f5f9;flex:1"><button type="button" onclick="showCB()" style="background:#1a56db;color:#fff;border:none;border-radius:6px;width:28px;height:28px;font-size:14px;cursor:pointer;flex-shrink:0" title="${T("costBreakdown")}">i</button></div></div>
    <div class="fi"><label>${T("custAddr")}</label><input id="sA" placeholder="${T("forInvoice")}"></div>
    <div class="fi"><label>${T("custGST")}</label><input id="sG" placeholder="${T("gstNumber")}"></div>
  </div>
  <div class="fa"><button class="btn btn-o" onclick="document.getElementById('modalOv').remove();S.modal=null;">${T("cancel")}</button><button class="btn btn-s" onclick="saveS()">${T("saveSale")}</button></div></div>`;
  document.body.appendChild(ov);S.modal="open";
}
function updCH(){const c=$("sC").value;const w=getWAC(c);$("sW").value=w>0?fmt(w)+"/kg":T("selectChemFirst");}
function showCB(){
  const chem=$("sC").value;if(!chem){toast(T("selectChemFirst"));return;}
  const ps=S.purchases.filter(p=>p.chemical===chem);if(!ps.length){toast(T("noPurchHistory"));return;}
  let tq=0,tc=0;ps.forEach(p=>{tq+=p.qty;tc+=p.qty*p.pricePerKg;});const wac=tq>0?tc/tq:0;
  let bd=document.createElement("div");bd.id="breakdownOv";bd.className="modal-ov";bd.style.zIndex="200";bd.onclick=function(e){if(e.target===bd)bd.remove();};
  bd.innerHTML=`<div class="modal" style="max-width:550px"><div class="modal-hd"><h3>${T("costBreakdown")}: ${chem}</h3><button class="modal-cl" onclick="document.getElementById('breakdownOv').remove()">&times;</button></div>
  <div style="padding:20px"><table style="width:100%;border-collapse:collapse">
  <thead><tr><th style="padding:8px 12px;background:#f8fafc;text-align:left;font-size:12px;color:#555;border-bottom:1px solid #ddd">${T("date")}</th><th style="padding:8px 12px;background:#f8fafc;text-align:left;font-size:12px;color:#555;border-bottom:1px solid #ddd">${T("vendor")}</th><th style="padding:8px 12px;background:#f8fafc;text-align:right;font-size:12px;color:#555;border-bottom:1px solid #ddd">${T("qty")}</th><th style="padding:8px 12px;background:#f8fafc;text-align:right;font-size:12px;color:#555;border-bottom:1px solid #ddd">${T("rateKg")}</th><th style="padding:8px 12px;background:#f8fafc;text-align:right;font-size:12px;color:#555;border-bottom:1px solid #ddd">${T("total")}</th></tr></thead>
  <tbody>${ps.map(p=>`<tr><td style="padding:8px 12px;font-size:13px;border-bottom:1px solid #f1f5f9">${p.date}</td><td style="padding:8px 12px;font-size:13px;border-bottom:1px solid #f1f5f9">${p.vendor}</td><td style="padding:8px 12px;font-size:13px;border-bottom:1px solid #f1f5f9;text-align:right">${fq(p.qty)}</td><td style="padding:8px 12px;font-size:13px;border-bottom:1px solid #f1f5f9;text-align:right">${fmt(p.pricePerKg)}</td><td style="padding:8px 12px;font-size:13px;border-bottom:1px solid #f1f5f9;text-align:right">${fmt(p.qty*p.pricePerKg)}</td></tr>`).join("")}
  <tr style="background:#f8fafc;font-weight:700"><td colspan="2" style="padding:10px 12px">${T("total")}</td><td style="padding:10px 12px;text-align:right">${fq(tq)}</td><td style="padding:10px 12px;text-align:right">-</td><td style="padding:10px 12px;text-align:right">${fmt(tc)}</td></tr></tbody></table>
  <div style="margin-top:16px;padding:14px;background:#e8eefb;border-radius:8px;text-align:center"><div style="font-size:12px;color:#555;text-transform:uppercase;font-weight:600">${T("weightedAvgCost")}</div><div style="font-size:24px;font-weight:700;color:#1a56db;margin-top:4px">${fmt(wac)}/kg</div><div style="font-size:12px;color:#555;margin-top:2px">${fmt(tc)} / ${fq(tq)}</div></div></div></div>`;
  document.body.appendChild(bd);
}
async function saveS(){
  const chem=$("sC").value;const d={date:$("sD").value,chemical:chem,customer:$("sCu").value.trim(),qty:parseFloat($("sQ").value)||0,pricePerKg:parseFloat($("sP").value)||0,costPerKg:getWAC(chem),customerAddr:$("sA").value.trim(),customerGst:$("sG").value.trim(),gstRate:18,addedBy:S.role,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  if(!d.chemical||!d.customer||!d.qty||!d.pricePerKg){toast(T("fillAll"));return;}
  const inv=getInv();if(!inv[chem]||inv[chem].qty<d.qty){toast(T("notEnoughStock"));return;}
  try{await db.collection("sales").add(d);const ov=document.getElementById("modalOv");if(ov)ov.remove();S.modal=null;toast(T("saleRecorded"));}catch(e){toast("Error: "+e.message);}
}
async function delS(id){if(!confirm(T("delete")+"?"))return;await db.collection("sales").doc(id).delete();toast(T("deleted"));}

function payHTML(){
  const cb=getCustBalances();const vb=getVendorBalances();
  return `<div class="page-hdr"><h1>${T("paymentsPage")}</h1><p>${T("paymentsSub")}</p></div>
  <div class="tabs">
    <a class="tab ${S.payTab==="customer"?"active":""}" onclick="S.payTab='customer';R()">${T("custPayments")}</a>
    <a class="tab ${S.payTab==="vendor"?"active":""}" onclick="S.payTab='vendor';R()">${T("vendorPayments")}</a>
    <a class="tab ${S.payTab==="log"?"active":""}" onclick="S.payTab='log';R()">${T("paymentLog")}</a>
  </div>
  ${S.payTab==="customer"?payCustomerHTML(cb):""}
  ${S.payTab==="vendor"?payVendorHTML(vb):""}
  ${S.payTab==="log"?payLogHTML():""}`;
}

function payCustomerHTML(cb){
  const rows=Object.entries(cb).sort((a,b)=>a[0].localeCompare(b[0]));
  return `<div class="card"><div class="card-hd"><h3>${T("custPayments")} - ${T("receivable")}</h3></div>
  <table><thead><tr><th>${T("customer")}</th><th>${T("totalAmount")}</th><th>${T("paid")}</th><th>${T("pending")}</th><th>${T("status")}</th><th>${T("actions")}</th></tr></thead><tbody>
  ${rows.map(([c,d])=>{const pend=d.total-d.paid;const pct=d.total>0?d.paid/d.total*100:0;
    const st=pend<=0?T("fullyPaid"):d.paid>0?T("partialPaid"):T("unpaid");
    const bc=pend<=0?"bg-gr":d.paid>0?"bg-yl":"bg-rd";
    return`<tr><td><b>${c}</b></td><td>${fmt(d.total)}</td><td style="color:#16a34a">${fmt(d.paid)}</td><td style="color:${pend>0?"#dc2626":"#16a34a"}"><b>${fmt(pend)}</b></td>
    <td><span class="badge ${bc}">${st}</span><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pend<=0?"#16a34a":"#f59e0b"}"></div></div></td>
    <td>${pend>0?`<button class="btn btn-s btn-sm" onclick="showPayForm('customer_in','${c.replace(/'/g,"\\'")}')">${T("recordPayment")}</button>`:""}</td></tr>`;}).join("")}
  ${rows.length===0?`<tr><td colspan="6" class="empty">${T("noSales")}</td></tr>`:""}</tbody></table></div>`;
}

function payVendorHTML(vb){
  const rows=Object.entries(vb).sort((a,b)=>a[0].localeCompare(b[0]));
  return `<div class="card"><div class="card-hd"><h3>${T("vendorPayments")} - ${T("payable")}</h3></div>
  <table><thead><tr><th>${T("vendor")}</th><th>${T("totalAmount")}</th><th>${T("paid")}</th><th>${T("pending")}</th><th>${T("status")}</th><th>${T("actions")}</th></tr></thead><tbody>
  ${rows.map(([v,d])=>{const pend=d.total-d.paid;const pct=d.total>0?d.paid/d.total*100:0;
    const st=pend<=0?T("fullyPaid"):d.paid>0?T("partialPaid"):T("unpaid");
    const bc=pend<=0?"bg-gr":d.paid>0?"bg-yl":"bg-rd";
    return`<tr><td><b>${v}</b></td><td>${fmt(d.total)}</td><td style="color:#16a34a">${fmt(d.paid)}</td><td style="color:${pend>0?"#dc2626":"#16a34a"}"><b>${fmt(pend)}</b></td>
    <td><span class="badge ${bc}">${st}</span><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pend<=0?"#16a34a":"#f59e0b"}"></div></div></td>
    <td>${pend>0?`<button class="btn btn-p btn-sm" onclick="showPayForm('vendor_out','${v.replace(/'/g,"\\'")}')">${T("payNow")}</button>`:""}</td></tr>`;}).join("")}
  ${rows.length===0?`<tr><td colspan="6" class="empty">${T("noPurch")}</td></tr>`:""}</tbody></table></div>`;
}

function payLogHTML(){
  return `<div class="card"><div class="card-hd"><h3>${T("paymentLog")}</h3></div>
  <table><thead><tr><th>${T("date")}</th><th>Type</th><th>${T("customer")}/${T("vendor")}</th><th>${T("amount")}</th><th>${T("paymentMode")}</th><th>${T("reference")}</th><th>${T("actions")}</th></tr></thead><tbody>
  ${S.paymentLogs.map(p=>{
    const isIn=p.type==="customer_in";
    return`<tr><td>${p.date}</td><td><span class="badge ${isIn?"bg-gr":"bg-bl"}">${isIn?T("paymentFrom"):T("paymentTo")}</span></td><td><b>${p.party}</b></td><td style="color:${isIn?"#16a34a":"#1a56db"}"><b>${fmt(p.amount)}</b></td><td>${p.mode||""}</td><td>${p.reference||""}</td>
    <td><button class="btn btn-d btn-sm" onclick="delPay('${p.id}')">${T("delete")}</button></td></tr>`;}).join("")}
  ${S.paymentLogs.length===0?`<tr><td colspan="7" class="empty">No payment records yet</td></tr>`:""}</tbody></table></div>`;
}

function showPayForm(type,party){
  const isIn=type==="customer_in";const balances=isIn?getCustBalances():getVendorBalances();
  const bal=balances[party];const pend=bal?(bal.total-bal.paid):0;
  let ov=document.createElement("div");ov.id="modalOv";ov.className="modal-ov";ov.onclick=function(e){if(e.target===ov){ov.remove();S.modal=null;}};
  ov.innerHTML=`<div class="modal" style="max-width:500px"><div class="modal-hd"><h3>${isIn?T("paymentFrom"):T("paymentTo")}: ${party}</h3><button class="modal-cl" onclick="document.getElementById('modalOv').remove();S.modal=null;">&times;</button></div>
  <div style="padding:16px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between">
    <div><span style="font-size:12px;color:#555">${T("totalAmount")}:</span> <b>${fmt(bal?bal.total:0)}</b></div>
    <div><span style="font-size:12px;color:#555">${T("paid")}:</span> <b style="color:#16a34a">${fmt(bal?bal.paid:0)}</b></div>
    <div><span style="font-size:12px;color:#555">${T("pending")}:</span> <b style="color:#dc2626">${fmt(pend)}</b></div>
  </div>
  <div class="fg">
    <div class="fi"><label>${T("paymentDate")}</label><input type="date" id="pyD" value="${td()}"></div>
    <div class="fi"><label>${T("amount")} (INR)</label><input type="number" id="pyA" placeholder="${pend.toFixed(2)}" step="0.01" max="${pend}"></div>
    <div class="fi"><label>${T("paymentMode")}</label><select id="pyM"><option value="Cash">${T("cash")}</option><option value="Bank Transfer">${T("bank")}</option><option value="Cheque">${T("cheque")}</option><option value="UPI">${T("upi")}</option></select></div>
    <div class="fi"><label>${T("reference")}</label><input id="pyR" placeholder="Cheque no, UTR, notes..."></div>
  </div>
  <div class="fa"><button class="btn btn-o" onclick="document.getElementById('modalOv').remove();S.modal=null;">${T("cancel")}</button><button class="btn btn-s" onclick="savePay('${type}','${party.replace(/'/g,"\\'")}')">${T("savePayment")}</button></div></div>`;
  document.body.appendChild(ov);S.modal="open";
}
async function savePay(type,party){
  const d={type:type,party:party,date:$("pyD").value,amount:parseFloat($("pyA").value)||0,mode:$("pyM").value,reference:$("pyR").value.trim(),addedBy:S.role,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  if(!d.amount||d.amount<=0){toast(T("fillAll"));return;}
  try{await db.collection("paymentLogs").add(d);const ov=document.getElementById("modalOv");if(ov)ov.remove();S.modal=null;toast(T("paymentSaved"));}catch(e){toast("Error: "+e.message);}
}
async function delPay(id){if(!confirm(T("delete")+"?"))return;await db.collection("paymentLogs").doc(id).delete();toast(T("deleted"));}

// =====================================================================
// INVOICES (always CGST+SGST, choose rate)
// =====================================================================
function invocHTML(){
  return `<div class="page-hdr"><h1>${T("invoicesPage")}</h1><p>${T("invoicesSub")}</p></div>
  <div class="card"><table><thead><tr><th>${T("date")}</th><th>${T("invoiceNum")}</th><th>${T("customer")}</th><th>${T("chemical")}</th><th>${T("amount")}</th><th>${T("actions")}</th></tr></thead><tbody>
  ${S.sales.map((s,i)=>{const n="PO-"+(s.date||"").replace(/-/g,"")+"-"+String(i+1).padStart(3,"0");
  return`<tr><td>${s.date}</td><td><b>${n}</b></td><td>${s.customer}</td><td>${s.chemical}</td><td>${fmt(s.qty*s.pricePerKg)}</td>
  <td><button class="btn btn-p btn-sm" onclick="genInv('${s.id}')">${T("viewPrint")}</button></td></tr>`;}).join("")}
  ${S.sales.length===0?`<tr><td colspan="6" class="empty">${T("noInvoices")}</td></tr>`:""}</tbody></table></div>`;
}
function genInv(sid){
  const s=S.sales.find(x=>x.id===sid);if(!s)return;const idx=S.sales.indexOf(s);
  const n="PO-"+(s.date||"").replace(/-/g,"")+"-"+String(idx+1).padStart(3,"0");
  let ov=document.createElement("div");ov.id="modalOv";ov.className="modal-ov";ov.onclick=function(e){if(e.target===ov){ov.remove();S.modal=null;}};
  ov.innerHTML=`<div class="modal" style="max-width:850px"><div class="modal-hd"><h3>${T("invoice")} ${n}</h3>
  <div style="display:flex;align-items:center;gap:10px">
    <label style="font-size:13px;font-weight:600">${T("gstRate")}:</label>
    <select id="grt" onchange="updInvP('${sid}')" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px"><option value="5">5%</option><option value="12">12%</option><option value="18" selected>18%</option><option value="28">28%</option></select>
    <button class="btn btn-p btn-sm" onclick="printInv()">${T("print")}</button>
    <button class="modal-cl" onclick="document.getElementById('modalOv').remove();S.modal=null;">&times;</button>
  </div></div>
  <div id="ib" style="padding:20px">${buildInv(s,n,18)}</div></div>`;
  document.body.appendChild(ov);S.modal="open";
}
function updInvP(sid){const s=S.sales.find(x=>x.id===sid);if(!s)return;const idx=S.sales.indexOf(s);const n="PO-"+(s.date||"").replace(/-/g,"")+"-"+String(idx+1).padStart(3,"0");const rate=parseFloat($("grt").value);$("ib").innerHTML=buildInv(s,n,rate);}
function buildInv(s,n,rate){
  const co=S.company;const sub=s.qty*s.pricePerKg;const halfRate=rate/2;const cgst=sub*halfRate/100;const sgst=cgst;const gt=sub+cgst+sgst;
  return `<div id="ip" style="background:#fff;padding:40px;border:1px solid #e2e8f0;border-radius:8px;max-width:750px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid #1e293b">
    <div><h2 style="font-size:20px;margin-bottom:4px">${co.name||"Purva Organics"}</h2><p style="font-size:12px;color:#64748b;max-width:250px">${co.address||""}</p>${co.phone?`<p style="font-size:12px;color:#64748b">Ph: ${co.phone}</p>`:""}${co.gst?`<p style="font-size:12px;color:#64748b">GST: ${co.gst}</p>`:""}</div>
    <div style="text-align:right"><h3 style="font-size:18px;color:#1a56db">${T("taxInvoice")}</h3><p style="font-size:13px;margin-top:8px"><b>${T("invoiceNum")}:</b> ${n}</p><p style="font-size:13px"><b>${T("date")}:</b> ${s.date}</p></div>
  </div>
  <div style="margin-bottom:20px;padding:14px;background:#f8fafc;border-radius:8px"><p style="font-size:11px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:4px">${T("billTo")}</p><p style="font-size:14px;font-weight:700">${s.customer}</p><p style="font-size:12px;color:#64748b">${s.customerAddr||""}</p>${s.customerGst?`<p style="font-size:12px;color:#64748b">GST: ${s.customerGst}</p>`:""}</div>
  <table style="width:100%;border-collapse:collapse;margin-bottom:16px"><thead><tr><th style="padding:10px;background:#f1f5f9;text-align:left">${T("item")}</th><th style="padding:10px;background:#f1f5f9;text-align:right">${T("qty")} (kg)</th><th style="padding:10px;background:#f1f5f9;text-align:right">${T("rate")}/kg</th><th style="padding:10px;background:#f1f5f9;text-align:right">${T("amount")}</th></tr></thead>
  <tbody><tr><td style="padding:10px">${s.chemical}</td><td style="padding:10px;text-align:right">${Number(s.qty).toLocaleString("en-IN")}</td><td style="padding:10px;text-align:right">${fmt(s.pricePerKg)}</td><td style="padding:10px;text-align:right">${fmt(sub)}</td></tr>
  <tr><td colspan="3" style="text-align:right;font-weight:600;padding:10px">${T("subtotal")}</td><td style="text-align:right;font-weight:600;padding:10px">${fmt(sub)}</td></tr>
  <tr><td colspan="3" style="text-align:right;font-weight:600;padding:10px">${T("cgst")} @ ${halfRate}%</td><td style="text-align:right;padding:10px">${fmt(cgst)}</td></tr>
  <tr><td colspan="3" style="text-align:right;font-weight:600;padding:10px">${T("sgst")} @ ${halfRate}%</td><td style="text-align:right;padding:10px">${fmt(sgst)}</td></tr>
  <tr style="background:#f1f5f9"><td colspan="3" style="text-align:right;font-weight:700;font-size:15px;padding:12px">${T("grandTotal")}</td><td style="text-align:right;font-weight:700;font-size:15px;padding:12px">${fmt(gt)}</td></tr></tbody></table>
  ${co.bank?`<div style="margin-top:20px;padding:14px;background:#f8fafc;border-radius:8px;font-size:12px"><p style="font-weight:700;margin-bottom:4px">${T("bankDetails")}</p><p>${T("bankName")}: ${co.bank}</p><p>${T("account")}: ${co.accountNo||""}</p><p>${T("ifsc")}: ${co.ifsc||""}</p><p>${T("branch")}: ${co.branch||""}</p></div>`:""}
  <div style="margin-top:30px;text-align:right;font-size:12px;color:#64748b"><p>For <b>${co.name||"Purva Organics"}</b></p><p style="margin-top:40px">${T("authSign")}</p></div></div>`;
}
function printInv(){const el=$("ip");if(!el)return;const w=window.open("","","width=800,height=600");w.document.write(`<html><head><title>Invoice</title><style>body{font-family:-apple-system,sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #e2e8f0}h2,h3{margin:0}p{margin:2px 0}</style></head><body>${el.outerHTML}</body></html>`);w.document.close();w.print();}

    <div class="fi"><label>${T("compName")}</label><input id="sn" value="${c.name||""}"></div>
    <div class="fi"><label>${T("gstNum")}</label><input id="sg" value="${c.gst||""}"></div>
    <div class="fi full"><label>${T("address")}</label><textarea id="sa" rows="2" style="padding:9px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;width:100%;box-sizing:border-box;font-family:inherit">${c.address||""}</textarea></div>
    <div class="fi"><label>${T("phone")}</label><input id="sp" value="${c.phone||""}"></div>
    <div class="fi"><label>${T("email")}</label><input id="se" value="${c.email||""}"></div>
  </div></div>
  <div class="card"><div class="card-hd"><h3>${T("bankDetails")}</h3></div><div class="fg">
    <div class="fi"><label>${T("bankName")}</label><input id="sb" value="${c.bank||""}"></div>
    <div class="fi"><label>${T("accNum")}</label><input id="sac" value="${c.accountNo||""}"></div>
    <div class="fi"><label>${T("ifscCode")}</label><input id="si" value="${c.ifsc||""}"></div>
    <div class="fi"><label>${T("branch")}</label><input id="sbr" value="${c.branch||""}"></div>
  </div><div class="fa"><button class="btn btn-p" onclick="saveSett()">${T("saveSett")}</button></div></div>`;
}
async function saveSett(){
  const d={name:$("sn").value.trim(),gst:$("sg").value.trim(),address:$("sa").value.trim(),phone:$("sp").value.trim(),email:$("se").value.trim(),bank:$("sb").value.trim(),accountNo:$("sac").value.trim(),ifsc:$("si").value.trim(),branch:$("sbr").value.trim()};
  try{await db.collection("settings").doc("company").set(d);toast(T("settSaved"));}catch(e){toast("Error: "+e.message);}
}

// =====================================================================
// CSV EXPORT
// =====================================================================
function xcsv(type){
  let csv="",fn="";
  if(type==="purchases"){csv="Date,Chemical,Vendor,Qty(kg),Price/kg,Total,Added By\n";S.purchases.forEach(p=>{csv+=`${p.date},"${p.chemical}","${p.vendor}",${p.qty},${p.pricePerKg},${p.qty*p.pricePerKg},${p.addedBy||""}\n`;});fn="purva_purchases.csv";}
  else if(type==="sales"){csv="Date,Chemical,Customer,Qty(kg),Sell Rate,Cost Rate,Margin/kg,Total Profit\n";S.sales.forEach(s=>{const m=s.pricePerKg-(s.costPerKg||0);csv+=`${s.date},"${s.chemical}","${s.customer}",${s.qty},${s.pricePerKg},${s.costPerKg||0},${m},${m*s.qty}\n`;});fn="purva_sales.csv";}
  else{csv="Chemical,Available(kg),Avg Cost/kg,Stock Value\n";const inv=getInv();Object.entries(inv).forEach(([c,d])=>{const a=d.qty>0?d.tc/d.qty:0;csv+=`"${c}",${d.qty},${a.toFixed(2)},${(d.qty*a).toFixed(2)}\n`;});fn="purva_inventory.csv";}
  const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=fn;a.click();toast(fn+" downloaded");
}
R();
