<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purva Organics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e293b,#334155)}
.login-box{background:#fff;border-radius:12px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:22px;margin-bottom:4px;color:#1e293b}.login-box p{color:#64748b;font-size:14px;margin-bottom:24px}
.login-box label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#334155}
.login-box input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:16px;outline:none}
.login-box input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.login-box button.mb{width:100%;padding:12px;background:#1a56db;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-box button.mb:hover{background:#1e40af}
.login-err{color:#dc2626;font-size:13px;margin-bottom:12px;display:none}
.sidebar{width:220px;background:#1e293b;color:#cbd5e1;padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10;overflow-y:auto}
.sidebar .logo{padding:0 20px 16px;border-bottom:1px solid #334155;margin-bottom:4px}
.sidebar .logo h2{color:#fff;font-size:16px}.sidebar .logo span{font-size:11px;color:#94a3b8}
.sidebar nav{flex:1;display:flex;flex-direction:column}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#cbd5e1;text-decoration:none;font-size:13px;cursor:pointer;transition:all .15s}
.sidebar nav a:hover{background:#334155;color:#fff}
.sidebar nav a.active{background:#3b82f6;color:#fff;font-weight:600}
.sidebar .user-info{padding:12px 20px;border-top:1px solid #334155;font-size:11px}
.comp-sw{padding:8px 16px;display:flex;flex-wrap:wrap;gap:4px}
.comp-sw button{padding:4px 8px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #475569;background:transparent;color:#94a3b8;white-space:nowrap}
.comp-sw button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.lang-sw{padding:4px 16px 8px;display:flex;gap:4px}
.lang-sw button{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #475569;background:transparent;color:#94a3b8}
.lang-sw button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.main{margin-left:220px;flex:1;padding:20px;min-height:100vh}
.page-hdr{margin-bottom:20px}.page-hdr h1{font-size:20px;font-weight:700}.page-hdr p{color:#555;font-size:13px;margin-top:2px}
.comp-badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;background:#dbeafe;color:#1e40af;margin-left:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.sc{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sc .lb{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;font-weight:600}.sc .vl{font-size:22px;font-weight:700;margin-top:3px}.sc .sb{font-size:11px;color:#555;margin-top:2px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.card-hd{padding:14px 18px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.card-hd h3{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:#555;font-weight:700;border-bottom:1px solid #ddd}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid #f1f5f9}tr:hover td{background:#f8fafc}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:#1a56db;color:#fff}.btn-p:hover{background:#1e40af}
.btn-s{background:#16a34a;color:#fff}.btn-d{background:#dc2626;color:#fff}.btn-o{background:#fff;color:#111;border:1px solid #ddd}
.btn-sm{padding:4px 8px;font-size:11px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px}
.fi{display:flex;flex-direction:column;gap:3px}.fi.full{grid-column:1/-1}
.fi label{font-size:11px;font-weight:600;color:#555}
.fi input,.fi select,.fi textarea{padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;width:100%;box-sizing:border-box}
.fi input:focus,.fi select:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.08)}
.fa{padding:0 18px 18px;display:flex;gap:8px;justify-content:flex-end}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600}
.bg-gr{background:#dcfce7;color:#166534}.bg-rd{background:#fee2e2;color:#991b1b}.bg-bl{background:#dbeafe;color:#1e40af}.bg-yl{background:#fef9c3;color:#854d0e}
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;width:92%;max-width:750px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{padding:16px 18px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}.modal-hd h3{font-size:15px;font-weight:700}
.modal-cl{background:none;border:none;font-size:20px;cursor:pointer;color:#555}
.empty{padding:30px;text-align:center;color:#555;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;z-index:200;animation:si .3s ease}
@keyframes si{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.tabs{display:flex;gap:0;border-bottom:2px solid #ddd;margin-bottom:16px}
.tab{padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:#555;text-decoration:none}
.tab.active{color:#1a56db;border-bottom-color:#1a56db}
.progress-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px}
.item-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
.item-row input{padding:7px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none}
.item-row button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;font-size:14px;background:#fee2e2;color:#991b1b}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:12px}.fg{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.item-row{grid-template-columns:1fr 1fr}}
@media print{.sidebar,.no-print,.toast{display:none!important}.main{margin:0;padding:0}.card{box-shadow:none}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDgD7b4pcLhC297EgcNgYG-ui0uDQ_Qy5E",authDomain:"purva-organics-pragnesh.firebaseapp.com",projectId:"purva-organics-pragnesh",storageBucket:"purva-organics-pragnesh.firebasestorage.app",messagingSenderId:"132054678761",appId:"1:132054678761:web:c5cb9f212e814d66ce8478"});
const db=firebase.firestore();
const COMPANIES=["Savy","Pragnesh","Khemirang 1","Khemirang 2"];
const PASS="Pragnesh2003@jasani";
const PAGES=["dashboard","purchases","inventory","sales","payments","expenses","invoices","settings"];
const EXP_CATS=["Salary","Marketing","Petrol/Transport","Rent/Office","Other"];

// ======================= STATE =======================
let S={auth:false,page:"dashboard",lang:"en",comp:COMPANIES[0],
  purchases:[],sales:[],payLogs:[],expenses:[],
  company:{name:"Purva Organics",gst:"",address:"",phone:"",email:"",bank:"",accountNo:"",ifsc:"",branch:""},
  modal:null,toastMsg:null,tt:null,payTab:"customer"};
let unsubs=[];
const $=id=>document.getElementById(id);
const fmt=n=>"\u20B9"+Number(n||0).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2});
const fq=n=>Number(n||0).toLocaleString("en-IN")+" kg";
const td=()=>new Date().toISOString().split("T")[0];
function toast(m){S.toastMsg=m;R();clearTimeout(S.tt);S.tt=setTimeout(()=>{S.toastMsg=null;R()},2500);}
function coll(name){return name+"_"+S.comp.replace(/\s/g,"_");}

// Inventory: sum purchase items - sale items for current company
function getInv(){
  const c={};
  S.purchases.forEach(p=>{(p.items||[]).forEach(it=>{if(!c[it.chemical])c[it.chemical]=0;c[it.chemical]+=(it.qty||0);});});
  S.sales.forEach(s=>{(s.items||[]).forEach(it=>{if(c[it.chemical]!==undefined)c[it.chemical]-=(it.qty||0);});});
  return c;
}
function getWAC(chem){
  let tc=0,tq=0;
  S.purchases.forEach(p=>{(p.items||[]).forEach(it=>{if(it.chemical===chem){tc+=it.qty*it.pricePerKg;tq+=it.qty;}});});
  return tq>0?tc/tq:0;
}
function uniq(arr,key){return[...new Set(arr.map(a=>a[key]).filter(Boolean))];}
function uniqItems(arr,field){const s=new Set();arr.forEach(a=>(a.items||[]).forEach(it=>{if(it[field])s.add(it[field]);}));return[...s];}
function getCustBal(){
  const b={};
  S.sales.forEach(s=>{if(!b[s.customer])b[s.customer]={total:0,paid:0};const t=(s.items||[]).reduce((a,it)=>a+it.qty*it.pricePerKg,0);const gst=t*(s.gstRate||18)/100;b[s.customer].total+=t+gst;});
  S.payLogs.filter(p=>p.type==="in").forEach(p=>{if(b[p.party])b[p.party].paid+=p.amount;});
  return b;
}
function getVendBal(){
  const b={};
  S.purchases.forEach(p=>{if(!b[p.vendor])b[p.vendor]={total:0,paid:0};const t=(p.items||[]).reduce((a,it)=>a+it.qty*it.pricePerKg,0);b[p.vendor].total+=t;});
  S.payLogs.filter(p=>p.type==="out").forEach(p=>{if(b[p.party])b[p.party].paid+=p.amount;});
  return b;
}

// ======================= FIREBASE =======================
function listen(){
  unsubs.forEach(u=>u());unsubs=[];
  ["purchases","sales","payLogs","expenses"].forEach(col=>{
    unsubs.push(db.collection(coll(col)).orderBy("createdAt","desc").onSnapshot(snap=>{
      S[col]=snap.docs.map(d=>({id:d.id,...d.data()}));R();
    }));
  });
  unsubs.push(db.collection("settings").doc("company").onSnapshot(d=>{if(d.exists)S.company={...S.company,...d.data()};R();}));
}
function switchComp(c){S.comp=c;S.page="dashboard";S.modal=null;listen();}

// ======================= RENDER =======================
function R(){const r=$("root");if(!S.auth){r.innerHTML=loginHTML();return;}if(S.modal==="open")return;
  r.innerHTML=sidebarHTML()+'<div class="main">'+pageHTML()+'</div>'+(S.toastMsg?`<div class="toast">${S.toastMsg}</div>`:"");}

// ======================= LOGIN =======================
function loginHTML(){
  return `<div class="login-page"><div class="login-box">
    <h1>Purva Organics</h1><p>Chemical Trading Management System</p>
    <div class="login-err" id="le">Invalid password</div>
    <label>Password</label><input type="password" id="lp" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="mb" onclick="doLogin()">Sign In</button></div></div>`;
}
function doLogin(){if($("lp").value===PASS){S.auth=true;listen();R();}else{const e=$("le");e.style.display="block";setTimeout(()=>e.style.display="none",2000);}}
function doLogout(){S.auth=false;unsubs.forEach(u=>u());unsubs=[];R();}

// ======================= SIDEBAR =======================
function sidebarHTML(){
  const labels={dashboard:"Dashboard",purchases:"Purchases",inventory:"Inventory",sales:"Sales",payments:"Payments",expenses:"Expenses",invoices:"Invoices",settings:"Settings"};
  return `<div class="sidebar">
  <div class="logo"><h2>Purva Organics</h2><span>Management System</span></div>
  <div class="comp-sw">${COMPANIES.map(c=>`<button class="${S.comp===c?'active':''}" onclick="switchComp('${c}')">${c}</button>`).join("")}</div>
  <nav>${PAGES.map(p=>`<a class="${S.page===p?'active':''}" onclick="nav('${p}')">${labels[p]}</a>`).join("")}
  <a onclick="doLogout()" style="margin-top:auto">Logout</a></nav>
  <div class="user-info"><div style="color:#3b82f6;font-weight:600;font-size:11px">${S.comp}</div>Admin</div></div>`;
}
function nav(p){S.page=p;S.modal=null;R();}
function pageHTML(){switch(S.page){case"dashboard":return dashHTML();case"purchases":return purchHTML();case"inventory":return invHTML();case"sales":return salesHTML();case"payments":return payHTML();case"expenses":return expHTML();case"invoices":return invocHTML();case"settings":return settHTML();default:return dashHTML();}}

// ======================= HELPERS =======================
function openModal(html){let ov=document.createElement("div");ov.id="modalOv";ov.className="modal-ov";ov.onclick=function(e){if(e.target===ov){ov.remove();S.modal=null;}};ov.innerHTML=html;document.body.appendChild(ov);S.modal="open";}
function closeModal(){const ov=$("modalOv");if(ov)ov.remove();S.modal=null;}
function hdr(title){return `<div class="page-hdr"><h1>${title}<span class="comp-badge">${S.comp}</span></h1></div>`;}

// ======================= DASHBOARD =======================
function dashHTML(){
  const inv=getInv();const totalStock=Object.values(inv).reduce((a,v)=>a+v,0);
  let totalPurchVal=0;S.purchases.forEach(p=>(p.items||[]).forEach(it=>{totalPurchVal+=it.qty*it.pricePerKg;}));
  let totalSalesVal=0,totalCost=0;
  S.sales.forEach(s=>(s.items||[]).forEach(it=>{totalSalesVal+=it.qty*it.pricePerKg;totalCost+=it.qty*(it.costPerKg||0);}));
  const totalExp=S.expenses.reduce((a,e)=>a+(e.amount||0),0);
  const grossProfit=totalSalesVal-totalCost;const netProfit=grossProfit-totalExp;
  const cb=getCustBal();const totalRec=Object.values(cb).reduce((a,v)=>a+(v.total-v.paid),0);
  const vb=getVendBal();const totalPay=Object.values(vb).reduce((a,v)=>a+(v.total-v.paid),0);
  const totalReceived=Object.values(cb).reduce((a,v)=>a+v.paid,0);
  const totalPaidOut=Object.values(vb).reduce((a,v)=>a+v.paid,0);
  const cashInHand=totalReceived-totalPaidOut-totalExp;

  return hdr("Dashboard")+`
  <div class="stats">
    <div class="sc"><div class="lb">Total Inventory</div><div class="vl" style="color:#1a56db">${fq(totalStock)}</div><div class="sb">${Object.keys(inv).length} chemicals</div></div>
    <div class="sc"><div class="lb">Total Purchases</div><div class="vl" style="color:#ea580c">${fmt(totalPurchVal)}</div><div class="sb">${S.purchases.length} orders</div></div>
    <div class="sc"><div class="lb">Total Sales</div><div class="vl" style="color:#16a34a">${fmt(totalSalesVal)}</div><div class="sb">${S.sales.length} orders</div></div>
    <div class="sc"><div class="lb">Gross Profit</div><div class="vl" style="color:${grossProfit>=0?"#16a34a":"#dc2626"}">${fmt(grossProfit)}</div></div>
  </div>
  <div class="stats">
    <div class="sc"><div class="lb">Expenses</div><div class="vl" style="color:#dc2626">${fmt(totalExp)}</div></div>
    <div class="sc"><div class="lb">Net Profit</div><div class="vl" style="color:${netProfit>=0?"#16a34a":"#dc2626"}">${fmt(netProfit)}</div><div class="sb">Gross - Expenses</div></div>
    <div class="sc"><div class="lb">Receivable</div><div class="vl" style="color:#ea580c">${fmt(totalRec)}</div><div class="sb">From customers</div></div>
    <div class="sc"><div class="lb">Payable</div><div class="vl" style="color:#dc2626">${fmt(totalPay)}</div><div class="sb">To vendors</div></div>
  </div>
  <div class="stats">
    <div class="sc" style="border:2px solid ${cashInHand>=0?"#16a34a":"#dc2626"}"><div class="lb">Cash In Hand</div><div class="vl" style="color:${cashInHand>=0?"#16a34a":"#dc2626"}">${fmt(cashInHand)}</div><div class="sb">Received - Paid - Expenses</div></div>
    <div class="sc"><div class="lb">Total Received</div><div class="vl" style="color:#16a34a">${fmt(totalReceived)}</div></div>
    <div class="sc"><div class="lb">Total Paid Out</div><div class="vl" style="color:#1a56db">${fmt(totalPaidOut)}</div></div>
  </div>`;
}

// ======================= PURCHASES (multi-item) =======================
function purchHTML(){
  return hdr("Purchases")+`
  <div class="no-print" style="margin-bottom:12px;display:flex;gap:8px">
    <button class="btn btn-p" onclick="showPF()">+ New Purchase</button>
    <button class="btn btn-o" onclick="xcsv('purchases')">Export CSV</button></div>
  <div class="card"><table><thead><tr><th>Date</th><th>Vendor</th><th>Items</th><th>Total</th><th>Actions</th></tr></thead><tbody>
  ${S.purchases.map(p=>{const items=p.items||[];const total=items.reduce((a,it)=>a+it.qty*it.pricePerKg,0);
  return`<tr><td>${p.date}</td><td><b>${p.vendor}</b></td>
  <td>${items.map(it=>`${it.chemical}: ${fq(it.qty)} @ ${fmt(it.pricePerKg)}/kg`).join("<br>")}</td>
  <td><b>${fmt(total)}</b></td>
  <td><button class="btn btn-o btn-sm" onclick="editP('${p.id}')">Edit</button> <button class="btn btn-d btn-sm" onclick="delDoc('${coll("purchases")}','${p.id}')">Del</button></td></tr>`;}).join("")}
  ${S.purchases.length===0?'<tr><td colspan="5" class="empty">No purchases yet</td></tr>':""}</tbody></table></div>`;
}
let tempItems=[];
function showPF(editId){
  const p=editId?S.purchases.find(x=>x.id===editId):null;
  tempItems=p?(p.items||[]).map(it=>({...it})):[{chemical:"",qty:"",pricePerKg:""}];
  const vn=uniq(S.purchases,"vendor").map(v=>`<option value="${v}">`).join("");
  const chems=uniqItems(S.purchases,"chemical").map(c=>`<option value="${c}">`).join("");
  openModal(`<div class="modal" style="max-width:700px"><div class="modal-hd"><h3>${editId?"Edit":"New"} Purchase</h3><button class="modal-cl" onclick="closeModal()">&times;</button></div>
  <div style="padding:18px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="fi"><label>Date</label><input type="date" id="pD" value="${p?p.date:td()}"></div>
      <div class="fi"><label>Vendor</label><input id="pV" value="${p?p.vendor:""}" placeholder="Vendor name" list="pvl"><datalist id="pvl">${vn}</datalist></div>
    </div>
    <div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><b style="font-size:13px">Items</b><button class="btn btn-o btn-sm" onclick="addTempItem();renderItems()">+ Add Item</button></div>
    <datalist id="pcl">${chems}</datalist>
    <div id="itemRows"></div>
    <div class="fi" style="margin-top:8px"><label>Notes (optional)</label><input id="pN" value="${p?p.notes||"":""}"></div>
  </div>
  <div class="fa"><button class="btn btn-o" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveP('${editId||""}')">${editId?"Save Changes":"Save Purchase"}</button></div></div>`);
  renderItems();
}
function editP(id){showPF(id);}
function addTempItem(){tempItems.push({chemical:"",qty:"",pricePerKg:""});}
function removeTempItem(i){tempItems.splice(i,1);renderItems();}
function renderItems(){
  const el=$("itemRows");if(!el)return;
  el.innerHTML=tempItems.map((it,i)=>`<div class="item-row">
    <input placeholder="Chemical name" value="${it.chemical}" oninput="tempItems[${i}].chemical=this.value" list="pcl">
    <input type="number" placeholder="Qty (kg)" value="${it.qty}" oninput="tempItems[${i}].qty=this.value">
    <input type="number" placeholder="Price/kg" value="${it.pricePerKg}" step="0.01" oninput="tempItems[${i}].pricePerKg=this.value">
    <button onclick="removeTempItem(${i})">x</button>
  </div>`).join("");
}
async function saveP(editId){
  const items=tempItems.map(it=>({chemical:(it.chemical||"").trim(),qty:parseFloat(it.qty)||0,pricePerKg:parseFloat(it.pricePerKg)||0})).filter(it=>it.chemical&&it.qty&&it.pricePerKg);
  if(!items.length){toast("Add at least one item");return;}
  const vendor=($("pV")?$("pV").value:"").trim();const date=$("pD")?$("pD").value:"";
  if(!vendor||!date){toast("Fill vendor and date");return;}
  const d={date,vendor,items,notes:($("pN")?$("pN").value:"").trim(),createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  try{if(editId){await db.collection(coll("purchases")).doc(editId).update(d);}else{await db.collection(coll("purchases")).add(d);}
    closeModal();toast(editId?"Purchase updated":"Purchase saved");
  }catch(e){toast("Error: "+e.message);}
}

// ======================= SALES (multi-item) =======================
let tempSaleItems=[];
function salesHTML(){
  return hdr("Sales")+`
  <div class="no-print" style="margin-bottom:12px;display:flex;gap:8px">
    <button class="btn btn-p" onclick="showSF()">+ New Sale</button>
    <button class="btn btn-o" onclick="xcsv('sales')">Export CSV</button></div>

async function saveS(editId){
  const items=tempSaleItems.map(it=>({chemical:(it.chemical||"").trim(),qty:parseFloat(it.qty)||0,pricePerKg:parseFloat(it.pricePerKg)||0,costPerKg:getWAC((it.chemical||"").trim())})).filter(it=>it.chemical&&it.qty&&it.pricePerKg);
  if(!items.length){toast("Add at least one item");return;}
  const customer=($("sCu")?$("sCu").value:"").trim();const date=$("sD")?$("sD").value:"";
  if(!customer||!date){toast("Fill customer and date");return;}
  // Check stock
  const inv=getInv();for(const it of items){if((inv[it.chemical]||0)<it.qty){toast(`Not enough ${it.chemical} in stock!`);return;}}
  const d={date,customer,items,customerAddr:($("sA")?$("sA").value:"").trim(),customerGst:($("sG")?$("sG").value:"").trim(),gstRate:18,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  try{if(editId){await db.collection(coll("sales")).doc(editId).update(d);}else{await db.collection(coll("sales")).add(d);}

    <div style="text-align:right"><h3 style="font-size:16px;color:#1a56db">TAX INVOICE</h3><p style="font-size:12px;margin-top:6px"><b>Invoice:</b> ${n}</p><p style="font-size:12px"><b>Date:</b> ${s.date}</p></div>
  </div>
  <div style="margin-bottom:16px;padding:12px;background:#f8fafc;border-radius:8px"><p style="font-size:10px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:3px">Bill To</p><p style="font-size:13px;font-weight:700">${s.customer}</p><p style="font-size:11px;color:#64748b">${s.customerAddr||""}</p>${s.customerGst?`<p style="font-size:11px;color:#64748b">GST: ${s.customerGst}</p>`:""}</div>
  <table style="width:100%;border-collapse:collapse;margin-bottom:12px"><thead><tr><th style="padding:8px;background:#f1f5f9;text-align:left;font-size:11px">Item</th><th style="padding:8px;background:#f1f5f9;text-align:right;font-size:11px">Qty (kg)</th><th style="padding:8px;background:#f1f5f9;text-align:right;font-size:11px">Rate/kg</th><th style="padding:8px;background:#f1f5f9;text-align:right;font-size:11px">Amount</th></tr></thead>
  <tbody>${items.map(it=>`<tr><td style="padding:8px;font-size:12px">${it.chemical}</td><td style="padding:8px;font-size:12px;text-align:right">${Number(it.qty).toLocaleString("en-IN")}</td><td style="padding:8px;font-size:12px;text-align:right">${fmt(it.pricePerKg)}</td><td style="padding:8px;font-size:12px;text-align:right">${fmt(it.qty*it.pricePerKg)}</td></tr>`).join("")}
  <tr><td colspan="3" style="text-align:right;font-weight:600;padding:8px">Subtotal</td><td style="text-align:right;font-weight:600;padding:8px">${fmt(sub)}</td></tr>
  <tr><td colspan="3" style="text-align:right;font-weight:600;padding:8px">CGST @ ${hr}%</td><td style="text-align:right;padding:8px">${fmt(cgst)}</td></tr>
  <tr><td colspan="3" style="text-align:right;font-weight:600;padding:8px">SGST @ ${hr}%</td><td style="text-align:right;padding:8px">${fmt(cgst)}</td></tr>
  <tr style="background:#f1f5f9"><td colspan="3" style="text-align:right;font-weight:700;font-size:14px;padding:10px">Grand Total</td><td style="text-align:right;font-weight:700;font-size:14px;padding:10px">${fmt(gt)}</td></tr></tbody></table>
  ${co.bank?`<div style="margin-top:16px;padding:12px;background:#f8fafc;border-radius:8px;font-size:11px"><p style="font-weight:700;margin-bottom:3px">Bank Details</p><p>Bank: ${co.bank}</p><p>A/C: ${co.accountNo||""}</p><p>IFSC: ${co.ifsc||""}</p><p>Branch: ${co.branch||""}</p></div>`:""}
  <div style="margin-top:24px;text-align:right;font-size:11px;color:#64748b"><p>For <b>${co.name||"Purva Organics"}</b></p><p style="margin-top:36px">Authorized Signatory</p></div></div>`;
}
function printInv(){const el=$("ip");if(!el)return;const w=window.open("","","width=800,height=600");w.document.write(`<html><head><title>Invoice</title><style>body{font-family:-apple-system,sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #e2e8f0}h2,h3{margin:0}p{margin:2px 0}</style></head><body>${el.outerHTML}</body></html>`);w.document.close();w.print();}

// ======================= SETTINGS =======================
function settHTML(){
  const c=S.company;
  return hdr("Settings")+`
  <div class="card"><div class="card-hd"><h3>Company Information</h3></div><div class="fg">
    <div class="fi"><label>Company Name</label><input id="sn" value="${c.name||""}"></div>
    <div class="fi"><label>GST Number</label><input id="sg" value="${c.gst||""}"></div>
    <div class="fi full"><label>Address</label><textarea id="sa" rows="2" style="padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;width:100%;box-sizing:border-box;font-family:inherit">${c.address||""}</textarea></div>
    <div class="fi"><label>Phone</label><input id="sp" value="${c.phone||""}"></div>
    <div class="fi"><label>Email</label><input id="se" value="${c.email||""}"></div>
  </div></div>
  <div class="card"><div class="card-hd"><h3>Bank Details</h3></div><div class="fg">
    <div class="fi"><label>Bank Name</label><input id="sb" value="${c.bank||""}"></div>
    <div class="fi"><label>Account Number</label><input id="sac" value="${c.accountNo||""}"></div>
    <div class="fi"><label>IFSC Code</label><input id="si" value="${c.ifsc||""}"></div>
    <div class="fi"><label>Branch</label><input id="sbr" value="${c.branch||""}"></div>
  </div><div class="fa"><button class="btn btn-p" onclick="saveSett()">Save Settings</button></div></div>`;
}
async function saveSett(){
  const d={name:$("sn").value.trim(),gst:$("sg").value.trim(),address:$("sa").value.trim(),phone:$("sp").value.trim(),email:$("se").value.trim(),bank:$("sb").value.trim(),accountNo:$("sac").value.trim(),ifsc:$("si").value.trim(),branch:$("sbr").value.trim()};
  try{await db.collection("settings").doc("company").set(d);toast("Settings saved");}catch(e){toast("Error: "+e.message);}
}

// ======================= SHARED =======================
async function delDoc(col,id){if(!confirm("Delete?"))return;await db.collection(col).doc(id).delete();toast("Deleted");}

function xcsv(type){
  let csv="",fn="";
  if(type==="purchases"){csv="Date,Vendor,Chemical,Qty(kg),Price/kg,Total\n";S.purchases.forEach(p=>(p.items||[]).forEach(it=>{csv+=`${p.date},"${p.vendor}","${it.chemical}",${it.qty},${it.pricePerKg},${it.qty*it.pricePerKg}\n`;}));fn=S.comp+"_purchases.csv";}
  else if(type==="sales"){csv="Date,Customer,Chemical,Qty(kg),Sell Price/kg,Cost/kg,Total\n";S.sales.forEach(s=>(s.items||[]).forEach(it=>{csv+=`${s.date},"${s.customer}","${it.chemical}",${it.qty},${it.pricePerKg},${it.costPerKg||0},${it.qty*it.pricePerKg}\n`;}));fn=S.comp+"_sales.csv";}
  const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=fn;a.click();toast(fn+" downloaded");
}

R();
